<!-- ══════════ LISTA ══════════ -->
<div *ngIf="vista === 'lista'" class="modulo-container">

  <div class="modulo-header">
    <h2>Gestión de Predios</h2>
    <button class="btn-nuevo" (click)="nuevo()">+ Nuevo Lote</button>
  </div>

  <table class="tabla">
    <thead>
      <tr>
        <th>Codigo</th>
        <th>Lugar de Produccion</th>
        <th>Cultivo Asociado</th>
        <th>Extensión (ha)</th>
        <th>Estado</th>
        <th>Acciones</th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let l of lotes">
        <td>{{ l.codigo }}</td>
        <td>{{ l.lugarProduccion }}</td>
        <td>{{ l.cultivoAsociado }}</td>
        <td>{{ l.extension }}</td>
        <td><span [class]="'badge badge-' + l.estado.toLowerCase()">{{ l.estado }}</span></td>
        <td class="acciones">
            <button class="btn-editar" (click)="editar(l)">Editar</button>
          <!-- Solo si está pendiente muestra aprobar/rechazar -->
  
          <!-- Solo si está activo muestra desactivar -->
            <button *ngIf="l.estado === 'Activo'" class="btn-toggle" (click)="desactivar(l)">Desactivar</button>
            <button *ngIf="l.estado === 'Inactivo'" class="btn-aprobar" (click)="activar(l)">Activar</button>
        </td>
      </tr>
    </tbody>
  </table>

 </div> 

<!-- ══════════ FORMULARIO ══════════ -->
<div *ngIf="vista === 'formulario'" class="modulo-container">

  <div class="modulo-header">
    <h2>{{ modoEdicion ? 'Editar Predio' : 'Nuevo Predio' }}</h2>
  </div>

  <div class="formulario">

    <div class="campo"><label>Codigo del lote</label>
      <input type="text" [(ngModel)]="formulario.codigo"/></div>

    <div class="campo"><label>Sitio de Produccion</label>
      <input type="text" [(ngModel)]="formulario.lugarProduccion"/></div>

    <div class="campo"><label>Extensión (hectáreas)</label>
      <input type="number" [(ngModel)]="formulario.extension"/></div>

    <div class="campo"><label>Cultivo</label>
      <input type="email" [(ngModel)]="formulario.cultivoAsociado"/></div>

    <!-- Número ICA solo se muestra en edición, es de solo lectura -->

    <div class="form-botones">
      <button class="btn-guardar"  (click)="guardar()">Guardar</button>
      <button class="btn-cancelar" (click)="volver()">Cancelar</button>
    </div>

  </div>


</div>
<!-- ══════════ ÉXITO ══════════ -->
<app-exito
  *ngIf="vista === 'exito'"
  mensaje="El lote ha sido guardado correctamente."
  (volver)="volver()">
</app-exito>
